name: Cloud Build EyeLeo 2026

on:
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build-windows:
    runs-on: windows-2025 # Актуальная чистая ОС на середину 2026 года

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache wxWidgets
      id: cache-wxwidgets
      uses: actions/cache@v4
      with:
        path: C:/Dev/wxWidgets-3.1.3
        key: ${{ runner.os }}-wxwidgets-3.1.3

    - name: Download and setup wxWidgets
      if: steps.cache-wxwidgets.outputs.cache-hit != 'true'
      run: |
        New-Item -ItemType Directory -Force -Path C:/Dev
        Invoke-WebRequest -Uri "https://github.com" -OutFile C:/Dev/wxWidgets.zip
        Expand-Archive -Path C:/Dev/wxWidgets.zip -DestinationPath C:/Dev/wxWidgets-3.1.3
        cd C:/Dev/wxWidgets-3.1.3
        # Путь обновлен под Visual Studio 2026 (Enterprise) на виртуальной машине GitHub
        cmd /c 'call "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cd /d C:\Dev\wxWidgets-3.1.3\build\msw && nmake -f makefile.vc BUILD=release TARGET_CPU=amd64'

    - name: Build EyeLeo App
      run: |
        $env:WXWIN="C:/Dev/wxWidgets-3.1.3"
        # Компиляция проекта с использованием CMake и окружения VS 2026
        cmd /c 'call "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cmake -Bwindowsbuild . && cmake --build windowsbuild --config Release'

    - name: Upload Artifact
      uses: actions/upload-artifact@v6 # Обновлено до v6 под современные стандарты Node.js
      with:
        name: EyeLeo-Compiled-App
        path: windowsbuild/Release/
